version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd my-amplify-app
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: my-amplify-app/dist
    files:
      - '**/*'
  cache:
    paths:
      - my-amplify-app/node_modules/**/*
